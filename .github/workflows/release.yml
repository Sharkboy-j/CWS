name: Release

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  DOCKERHUB_USER: sharkboy-j

jobs:
  lint:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.1'

    - name: Install golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest

    - name: Run linter
      run: golangci-lint run

  build:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.1'

    - name: Build
      run: go build -v ./...


  docker-build-push:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract version from tag
      id: tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:latest
          ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:${{ steps.tag.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  create-release:
    runs-on: self-hosted
    needs: docker-build-push
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Extract version from tag
      id: tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        name: Release ${{ steps.tag.outputs.version }}
        body: |
          ## Release ${{ steps.tag.outputs.version }}
          
          Docker image: `${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:${{ steps.tag.outputs.version }}`
          
          ### Pull the image
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:${{ steps.tag.outputs.version }}
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}