name: Release

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  DOCKERHUB_USER: sharkboy-j

jobs:
  lint:
    runs-on: [self-hosted, amd64]
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}

    - name: Set up Go with caching
      uses: ./.github/actions/setup-go-cached
      with:
        go-version: '1.23.1'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.6

  build:
    runs-on: [self-hosted, amd64]
    needs: lint
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}

    - name: Set up Go with caching
      uses: ./.github/actions/setup-go-cached
      with:
        go-version: '1.23.1'

    - name: Build
      run: go build -v ./...

  docker-build-push:
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: [self-hosted, amd64]
          - platform: linux/arm64
            runner: [self-hosted, ARM64]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract version from tag
      id: tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract platform architecture
      id: platform
      run: |
        ARCH=$(echo "${{ matrix.platform }}" | cut -d'/' -f2)
        echo "arch=$ARCH" >> $GITHUB_OUTPUT
        echo "Architecture: $ARCH"

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: ${{ matrix.platform }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:${{ steps.tag.outputs.version }}-${{ steps.platform.outputs.arch }}
        cache-from: type=gha,scope=${{ matrix.platform }}
        cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

  docker-manifest:
    runs-on: [self-hosted, amd64]
    needs: docker-build-push
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}

    - name: Extract version from tag
      id: tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push multi-arch manifest
      run: |
        VERSION=${{ steps.tag.outputs.version }}
        docker buildx imagetools create \
          -t ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:latest \
          -t ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:$VERSION \
          ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:$VERSION-amd64 \
          ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:$VERSION-arm64

  create-release:
    runs-on: [self-hosted, amd64]
    needs: docker-manifest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}

    - name: Extract version from tag
      id: tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        name: Release ${{ steps.tag.outputs.version }}
        body: |
          ## Release ${{ steps.tag.outputs.version }}

          Docker image: `${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:${{ steps.tag.outputs.version }}`

          ### Pull the image
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USER }}/cws:${{ steps.tag.outputs.version }}
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
