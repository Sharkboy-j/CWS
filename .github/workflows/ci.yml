name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go with caching
      uses: ./.github/actions/setup-go-cached
      with:
        go-version: '1.23.1'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.6

  build:
    runs-on: [self-hosted, amd64]
    needs: lint
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go with caching
      uses: ./.github/actions/setup-go-cached
      with:
        go-version: '1.23.1'

    - name: Build
      run: go build -v ./...
