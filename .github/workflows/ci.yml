name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: [self-hosted, arm64]
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go with caching
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.7.2

  build:
    runs-on: [self-hosted, arm64]
    needs: lint
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go with caching
      uses: ./.github/actions/setup-go-cached
      with:
        go-version: '1.23.1'

    - name: Build
      run: go build -v ./...
